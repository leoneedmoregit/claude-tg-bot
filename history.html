<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: #ffffff0f;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --accent3: #43e97b;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --tag-bg: #ffffff08;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Golos Text', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    top: -30%;
    left: -10%;
    width: 60%;
    height: 60%;
    background: radial-gradient(ellipse, #6c63ff18 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -20%;
    right: -10%;
    width: 50%;
    height: 50%;
    background: radial-gradient(ellipse, #ff658418 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap { max-width: 1100px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

  /* Header */
  header {
    padding: 60px 0 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
  }
  .header-inner { display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
  .logo { display: flex; align-items: center; gap: 16px; }
  .logo-icon {
    width: 52px; height: 52px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    box-shadow: 0 0 30px #6c63ff40;
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(32px, 5vw, 52px);
    letter-spacing: 2px;
    line-height: 1;
    background: linear-gradient(135deg, #fff 30%, #6c63ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle { color: var(--muted); font-size: 14px; margin-top: 4px; }

  .stats { display: flex; gap: 24px; flex-wrap: wrap; }
  .stat { text-align: right; }
  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    line-height: 1;
    color: var(--accent);
  }
  .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  /* Search & filter */
  .controls {
    display: flex; gap: 12px; margin-bottom: 32px; flex-wrap: wrap; align-items: center;
  }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 16px 12px 44px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap::before {
    content: '🔍';
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    font-size: 16px; pointer-events: none;
  }
  .filter-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 12px 18px;
    border-radius: 10px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    transition: all .2s;
    white-space: nowrap;
  }
  .filter-btn.active, .filter-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: #6c63ff12;
  }

  /* Grid */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    cursor: pointer;
    transition: all .25s ease;
    position: relative;
    overflow: hidden;
    animation: fadeUp .5s ease both;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--card-accent, var(--accent)), transparent);
    opacity: 0;
    transition: opacity .3s;
  }
  .card:hover { transform: translateY(-4px); border-color: #ffffff1a; box-shadow: 0 20px 60px #00000060; }
  .card:hover::before { opacity: 1; }

  .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
  .card-emoji { font-size: 28px; line-height: 1; flex-shrink: 0; }
  .card-date { font-size: 11px; color: var(--muted); white-space: nowrap; }

  .card-title {
    font-size: 16px; font-weight: 700;
    line-height: 1.3; margin-bottom: 10px;
    color: var(--text);
  }
  .card-summary {
    font-size: 13px; line-height: 1.6;
    color: var(--muted);
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 16px; }
  .tag {
    background: var(--tag-bg);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
  }
  .card-link {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 16px;
    color: var(--accent);
    font-size: 13px; font-weight: 600;
    text-decoration: none;
    opacity: 0; transform: translateY(4px);
    transition: all .2s;
  }
  .card:hover .card-link { opacity: 1; transform: translateY(0); }

  /* Category colors */
  .cat-ferma { --card-accent: #43e97b; }
  .cat-obshchee { --card-accent: #6c63ff; }
  .cat-sudya { --card-accent: #f7971e; }
  .cat-lzt { --card-accent: #ff6584; }
  .cat-ielts { --card-accent: #4facfe; }
  .cat-infra { --card-accent: #a8edea; }
  .cat-other { --card-accent: #c2c2c2; }

  .cat-obshchee .tag.main { background: #6c63ff18; border-color: #6c63ff40; color: #6c63ff; }
  .cat-sudya .tag.main { background: #f7971e18; border-color: #f7971e40; color: #f7971e; }
  .cat-lzt .tag.main { background: #ff658418; border-color: #ff658440; color: #ff6584; }
  .cat-ielts .tag.main { background: #4facfe18; border-color: #4facfe40; color: #4facfe; }
  .cat-infra .tag.main { background: #a8edea18; border-color: #a8edea40; color: #a8edea; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: #00000090;
    backdrop-filter: blur(8px);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    opacity: 0; pointer-events: none;
    transition: opacity .3s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--card);
    border: 1px solid #ffffff18;
    border-radius: 20px;
    max-width: 680px; width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    padding: 32px;
    transform: translateY(20px);
    transition: transform .3s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-close {
    position: absolute; top: 16px; right: 16px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--muted); width: 32px; height: 32px;
    border-radius: 8px; cursor: pointer; font-size: 18px;

  .modal-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }

  .modal-body { font-size: 14px; line-height: 1.8; color: #b0b0c0; }
  .modal-actions { display: flex; gap: 12px; margin-top: 24px; }
  .btn-primary {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--accent); color: #fff;
    padding: 12px 20px; border-radius: 10px;
    text-decoration: none; font-size: 14px; font-weight: 600;

  .btn-sec {

    background: var(--surface); color: var(--text);

  .empty { text-align: center; padding: 80px 20px; color: var(--muted); font-size: 16px; }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }

  @media (max-width: 600px) {
    .stats { display: none; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>

let activeFilter = 'all';

function renderCards(list) {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  grid.innerHTML = '';
  if (!list.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  list.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = `card cat-${c.cat}`;
    div.style.animationDelay = `${i * 0.05}s`;
    div.onclick = () => openModal(c);
    div.innerHTML = `
      <div class="card-header">
        <div class="card-emoji">${c.emoji}</div>
        <div class="card-date">${c.date}</div>
      </div>
      <div class="card-title">${c.title}</div>
      <div class="card-summary">${c.summary}</div>
      <div class="card-tags">
        ${c.tags.map((t,i) => `<span class="tag${i===0?' main':''}">${t}</span>`).join('')}
      </div>
      <a class="card-link" href="${c.url}" target="_blank" onclick="e=>e.stopPropagation()">
        Открыть диалог →
      </a>
    `;
    grid.appendChild(div);
  });
}

function filterCards() {
  const q = document.getElementById('search').value.toLowerCase();
  const list = CHATS.filter(c => {
    const matchCat = activeFilter === 'all' || c.cat === activeFilter;
    const matchQ = !q || c.title.toLowerCase().includes(q) || c.summary.toLowerCase().includes(q) || c.tags.join(' ').toLowerCase().includes(q);
    return matchCat && matchQ;
  });
  renderCards(list);
}

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterCards();
}

function openModal(c) {
  document.getElementById('m-emoji').textContent = c.emoji;
  document.getElementById('m-title').textContent = c.title;
  document.getElementById('m-date').textContent = c.date + ' · ' + c.tags.join(', ');
  document.getElementById('m-body').textContent = c.full;
  document.getElementById('m-actions').innerHTML = `
    <a class="btn-primary" href="${c.url}" target="_blank">↗ Открыть диалог</a>
    <button class="btn-sec" onclick="closeModalBtn()">Закрыть</button>
  `;
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal')) closeModalBtn();
}
function closeModalBtn() {
  document.getElementById('modal').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalBtn(); });

renderCards(CHATS);
</script>
